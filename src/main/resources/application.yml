spring:
  application:
    name: iot-intrusion-detection
  datasource:
    url: jdbc:postgresql://localhost:5432/iot_ids
    username: iot
    password: iot
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: iot-ids
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.github.hkocamandev.iot_intrusion_detection.dto"
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  topics:
    traffic-raw: iot.traffic.raw
    alerts: iot.alerts
  simulator:
    enabled: false
    csv-path: data/RT_IOT2022.csv
    delay-ms: 50
  rules:
    - name: dos-high-packet-rate
      feature: fwd_pkts_tot
      threshold: 1000
      attack-type: DOS
      severity: HIGH
    - name: recon-long-flow
      feature: flow_duration
      threshold: 60
      attack-type: RECON
      severity: MEDIUM
  ml:
    enabled: true
    url: http://localhost:8000
    timeout-ms: 2000
    min-score: 0.5
    severity-by-type:
      DOS: HIGH
      DDOS: CRITICAL
      PORT_SCAN: MEDIUM
      RECON: MEDIUM
      BRUTE_FORCE: HIGH
      OTHER: LOW
  llm:
    enabled: false
    model: claude-haiku-4-5
    timeout: 30s
    enrichment:
      batch-size: 10
      poll-interval: 10s
